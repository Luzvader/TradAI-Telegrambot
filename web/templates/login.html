<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradAI — Acceso</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d28;
            --border: #2a2d3a;
            --text: #e0e0e0;
            --text-muted: #8b8fa3;
            --accent: #6c5ce7;
            --accent-hover: #5a4bd6;
            --red: #e17055;
            --green: #00b894;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }
        .login-card h1 span { color: var(--accent); }
        .login-card .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .login-card label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .code-input {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 1.8rem;
            letter-spacing: 0.8rem;
            text-align: center;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .code-input:focus {
            border-color: var(--accent);
        }
        .code-input::placeholder {
            color: var(--border);
            letter-spacing: 0.5rem;
            font-size: 1.4rem;
        }
        .submit-btn {
            width: 100%;
            padding: 0.85rem;
            margin-top: 1.5rem;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: var(--accent-hover); }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error-msg {
            margin-top: 1rem;
            padding: 0.7rem;
            background: rgba(225, 112, 85, 0.12);
            border: 1px solid rgba(225, 112, 85, 0.3);
            border-radius: 8px;
            color: var(--red);
            font-size: 0.85rem;
        }
        .hint {
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .hint code {
            background: var(--bg);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--accent);
        }
        .lock-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">🔐</div>
        <h1>📊 <span>Trad</span>AI</h1>
        <p class="subtitle">Introduce el código de acceso</p>

        <form method="POST" action="/login" id="loginForm">
            <label for="code">Código de acceso</label>
            <input
                type="text"
                id="code"
                name="code"
                class="code-input"
                placeholder="······"
                maxlength="6"
                pattern="[0-9]{6}"
                inputmode="numeric"
                autocomplete="off"
                autofocus
                required
            >
            <button type="submit" class="submit-btn" id="submitBtn">Acceder</button>
        </form>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <p class="hint">
            Genera un código desde Telegram con <code>/web</code><br>
            El código es de un solo uso y expira en 5 minutos.<br>
            Máximo 5 intentos — luego bloqueo de 15 min.
        </p>
    </div>

    <script>
        const input = document.getElementById('code');
        const btn = document.getElementById('submitBtn');

        // Solo permitir números
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
            btn.disabled = e.target.value.length !== 6;
        });

        // Auto-submit al completar 6 dígitos
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 6) {
                document.getElementById('loginForm').submit();
            }
        });

        btn.disabled = true;
    </script>
</body>
</html>
