services:
  db:
    image: postgres:16-alpine
    container_name: tradai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradai_password}
      POSTGRES_DB: ${POSTGRES_DB:-tradai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tradai:
    build: .
    container_name: tradai_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tradai}:${POSTGRES_PASSWORD:-tradai_password}@db:5432/${POSTGRES_DB:-tradai_db}
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
